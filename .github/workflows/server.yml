name: Build and push server

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: server-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      serverChanged: ${{ steps.filter.outputs.server }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            server:
              - 'server/**'
              - '.github/workflows/server.yml'

  test-unit:
    needs: detect-changes
    if: needs.detect-changes.outputs.serverChanged == 'true'
    timeout-minutes: 60
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./server

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: "npm"
          cache-dependency-path: "**/package.json"
      - name: Install dependencies
        run: npm i
      - name: Run Jest tests
        run: npm run test:unit
      - name: Upload Jest Coverage Report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: jest-coverage-report
          path: "server/coverage/"
          retention-days: 30

  docker-build:
    needs: detect-changes
    if: needs.detect-changes.outputs.serverChanged == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            anicklaus/cheer-tool
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          platforms: linux/amd64
          push: ${{github.ref == 'refs/heads/main'}}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deployment-trigger:
    runs-on: ubuntu-latest
    needs:
      - docker-build
      - test-unit
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger server deployment
        run: |
          curl -X POST https://watchtower.andreasnicklaus.de/v1/update \
            -H "Authorization: Bearer ${{ secrets.WATCHTOWER_TOKEN }}"
